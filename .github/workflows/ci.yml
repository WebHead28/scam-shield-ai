name: Scam Shield AI — CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download your code onto the CI runner
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Step 3: Cache pip packages so re-runs are fast
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Step 4: Install dependencies
      - name: Install dependencies
        working-directory: backend
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      # Step 5: Pre-download NLTK data
      - name: Download NLTK data
        run: |
          python -c "import nltk; nltk.download('punkt', quiet=True); nltk.download('punkt_tab', quiet=True)"

      # Step 6: Check the app imports without crashing
      - - name: Verify app starts
        working-directory: backend
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          PYTHONPATH: /home/runner/work/scam-shield-ai/scam-shield-ai/backend
        run: |
          python -c "from app.main import app; print('App imported successfully')"

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Build the Docker image to confirm the Dockerfile is valid
      - name: Build Docker image
        working-directory: backend
        run: |
          docker build -t scam-shield-ai:test .

      - name: Confirm image was built
        run: |
          docker images scam-shield-ai:test
